각 엑셀 파일의 1행은 제목이며, 2행부터 데이터가 시작됩니다.
아래 순서대로 작동하는 VBA 코드를 생성하세요.

1. 코드를 실행하면 여러 파일들을 선택할 수 있는 창이 나타납니다.
2. 현재 파일에 새로운 시트를 추가합니다.
3. 새 시트의 1행에 선택한 첫 번째 파일의 제목을 입력합니다.
4. 2행부터 모든 파일의 데이터를 아래로 누적하세요.
5. 열었던 모든 파일은 자동으로 닫아주세요.
6. 작업이 완료되면 &quot;작업완료&quot; 라는 메시지박스를 표시하세요.</code></pre></div><div style="display:contents" dir="auto"><p id="98241133-0f8f-82f7-b540-811f28d03405" class="">
</p></div><div style="display:contents" dir="auto"><p id="aea41133-0f8f-821e-91e8-811c673fca81" class="">위 프롬프트로 작성된 코드를 복사합니다.</p></div><div style="display:contents" dir="auto"><p id="73b41133-0f8f-8239-bc25-81f502ffbcc0" class="">VBA 편집기 모듈 안에 코드를 붙여넣습니다.</p></div><div style="display:contents" dir="ltr"><figure id="84841133-0f8f-82a8-ac54-8126b55c8a4f" class="image"><a href="image%2039.png"><img style="width:709.982177734375px" src="image%2039.png"/></a></figure></div><div style="display:contents" dir="auto"><p id="91d41133-0f8f-833e-a2e0-817658ea33b8" class="">
</p></div><div style="display:contents" dir="auto"><p id="77641133-0f8f-8231-90a0-01811e1fa053" class="">코드 최상단 Sub에 마우스커서를 두고 <code>F5</code> 를 눌러 코드를 실행합니다.</p></div><div style="display:contents" dir="auto"><p id="d0b41133-0f8f-836f-a0a2-018fdb7bad06" class="">
</p></div><div style="display:contents" dir="auto"><p id="a4941133-0f8f-8293-a3eb-818db8c71129" class="">오류가 발생하는 경우 오류메시지를 캡쳐(<code>Win + Shift + S</code>)하여 ChatGPT에게 전달하세요.</p></div><div style="display:contents" dir="auto"><p id="63e41133-0f8f-8343-875a-81e4104a1c8b" class="">오류가 나타나지 않지만 작동하지 않는 경우, 증상을 구체적으로 서술하여 ChatGPT에게 전달하세요.</p></div><div style="display:contents" dir="auto"><p id="b2341133-0f8f-8268-abaa-01b4a02cecef" class="">
</p></div><div style="display:contents" dir="auto"><p id="db541133-0f8f-825e-bf7c-81f5d6a030f1" class="">원하는대로 잘 작동한다면 시트에 도형을 생성하고 <code>파일 합치기</code> 버튼을 생성합니다.</p></div><div style="display:contents" dir="ltr"><figure id="0ea41133-0f8f-833f-aabf-81ef655e9526" class="image"><a href="image%2040.png"><img style="width:709.982177734375px" src="image%2040.png"/></a></figure></div><div style="display:contents" dir="auto"><p id="ddd41133-0f8f-8347-a65f-01ad2b0841bf" class="">도형 우클릭 → 매크로 지정 → ChatGPT가 작성해준 코드명 선택 → 확인</p></div><div style="display:contents" dir="ltr"><figure id="a5c41133-0f8f-8315-961e-8132c0f1be33" class="image"><a href="image%2041.png"><img style="width:710px" src="image%2041.png"/></a></figure></div></details></li></ul></div><div style="display:contents" dir="auto"><ul id="34f41133-0f8f-822c-a8cb-013fb974156f" class="toggle"><li><details open=""><summary>월별 실적자료 취합/정리 자동화하기</summary><div style="display:contents" dir="auto"><ul id="06b41133-0f8f-83b7-9ce3-016d488514c2" class="block-color-yellow_background bulleted-list"><li style="list-style-type:disc">실습자료<div style="display:contents" dir="ltr"><figure id="a2e41133-0f8f-8371-b9fe-81bef2c6f418"><div class="source"><a href="%EC%9B%94%EB%B3%84_%EC%8B%A4%EC%A0%81%EC%9E%90%EB%A3%8C.zip">월별 실적자료.zip</a></div></figure></div></li></ul></div><div style="display:contents" dir="auto"><p id="19141133-0f8f-838c-a31f-81c7d4a60cab" class="">
</p></div><div style="display:contents" dir="auto"><h4 id="2eb41133-0f8f-8345-9b93-017d69ca9c76" class="">실습 시나리오</h4></div><div style="display:contents" dir="auto"><p id="d6841133-0f8f-83a3-8e70-0102e499762d" class="">여러 부서(또는 지점)에서 <strong>동일한 양식</strong>으로 제출한 월별 실적자료를 하나의 마스터 파일로 취합하고, 자동으로 정리·요약하는 VBA 코드를 <strong>AI로 생성</strong>합니다.</p></div><div style="display:contents" dir="auto"><p id="92241133-0f8f-8281-9ff9-0146747d26a5" class="">
</p></div><div style="display:contents" dir="auto"><h4 id="a9941133-0f8f-83fd-b938-81bd62df049e" class="">실습 순서</h4></div><div style="display:contents" dir="auto"><ol type="1" id="acf41133-0f8f-83d3-94d3-01f1fea85d45" class="numbered-list" start="1"><li>실적자료 양식 확인<div style="display:contents" dir="auto"><ul id="fe941133-0f8f-8387-a6c3-013057a38789" class="bulleted-list"><li style="list-style-type:disc">부서명</li></ul></div><div style="display:contents" dir="auto"><ul id="7a341133-0f8f-8257-8c77-81f13447cf18" class="bulleted-list"><li style="list-style-type:disc">항목</li></ul></div><div style="display:contents" dir="auto"><ul id="7cb41133-0f8f-825e-83a6-01468735a9c4" class="bulleted-list"><li style="list-style-type:disc">실적값</li></ul></div><div style="display:contents" dir="auto"><ul id="d0341133-0f8f-8251-8d2b-81d368da7cfb" class="bulleted-list"><li style="list-style-type:disc">목표값</li></ul></div><div style="display:contents" dir="auto"><ul id="4f741133-0f8f-83f0-81fe-81d2c30cfd58" class="bulleted-list"><li style="list-style-type:disc">달성률(추가 계산)</li></ul></div></li></ol></div><div style="display:contents" dir="auto"><ol type="1" id="30f41133-0f8f-836e-95a8-013479f9885b" class="numbered-list" start="2"><li>AI에게 아래 프롬프트로 코드 요청</li></ol></div><div style="display:contents" dir="auto"><ol type="1" id="40f41133-0f8f-822a-b43a-01d917bbdabc" class="numbered-list" start="3"><li>생성된 코드를 VBA 편집기에 붙여넣고 실행</li></ol></div><div style="display:contents" dir="auto"><ol type="1" id="13a41133-0f8f-8308-b8ca-81d775777e84" class="numbered-list" start="4"><li>오류 발생 시 오류 메시지를 캡쳐하여 AI에게 전달하여 수정</li></ol></div><div style="display:contents" dir="auto"><ol type="1" id="ea241133-0f8f-839a-9037-01640f83ed6d" class="numbered-list" start="5"><li>정상 작동 확인 후 버튼 생성 및 매크로 연결</li></ol></div><div style="display:contents" dir="auto"><p id="e4441133-0f8f-828b-86c3-8143b6f8968e" class="">
</p></div><div style="display:contents" dir="auto"><h4 id="ded41133-0f8f-828c-b2fd-81f4d349fd0b" class="">AI 프롬프트(복사해서 입력)</h4></div><div style="display:contents" dir="auto"><pre id="cf241133-0f8f-83c6-90c6-0182076342d9" class="code code-wrap"><code class="language-visual-basic" style="white-space:pre-wrap;word-break:break-all">여러 부서에서 동일한 양식의 월별 실적 엑셀 파일을 제출합니다.
각 파일의 구조는 다음과 같습니다:
- 1행: 제목행 (부서명, 항목, 실적값, 목표값)
- 2행부터 데이터

아래 순서대로 작동하는 VBA 코드를 생성하세요.

1. 코드를 실행하면 여러 파일을 선택할 수 있는 창이 나타납니다.
2. 현재 파일에 &quot;취합결과&quot;라는 새 시트를 추가합니다.
3. 1행에 제목을 입력하고, A열 앞에 &quot;파일명&quot; 열을 추가합니다.
4. 각 파일의 데이터를 순서대로 누적하되, 파일명 열에는 해당 파일 이름을 자동 기입합니다.
5. 마지막 행 아래에 부서별 실적 합계를 SUBTOTAL 함수로 자동 생성합니다.
6. 달성률 열을 추가하여 &quot;실적값/목표값*100&quot;으로 자동 계산합니다.
7. 달성률이 100% 미만인 행은 빨간색으로 조건부 서식을 적용합니다.
8. 열었던 모든 파일은 자동으로 닫아주세요.
9. 작업이 완료되면 &quot;취합 완료: N개 파일, 총 M건&quot; 이라는 메시지박스를 표시하세요.</code></pre></div><div style="display:contents" dir="auto"><p id="47b41133-0f8f-83ce-a63c-8100501061ce" class="">
</p></div><div style="display:contents" dir="auto"><hr id="98341133-0f8f-82aa-8eba-016d2141311d"/></div><div style="display:contents" dir="auto"><h3 id="e2941133-0f8f-8271-a2e0-016cc33c0189" class="">AI로 데이터 자동 정리 코드 만들기</h3></div><div style="display:contents" dir="auto"><h4 id="f8841133-0f8f-83be-af50-815458b4c762" class="">실습자료</h4></div><div style="display:contents" dir="ltr"><figure id="d9c41133-0f8f-8219-9863-01c878fbdc16"><div class="block-color-yellow_background source"><a href="%EB%8D%B0%EC%9D%B4%ED%84%B0_%EC%9E%90%EB%8F%99_%EC%A0%95%EB%A6%AC.xlsx">데이터 자동 정리.xlsx</a></div></figure></div><div style="display:contents" dir="auto"><h4 id="c7d41133-0f8f-83f7-9393-81ac65b563d7" class="">실습 시나리오</h4></div><div style="display:contents" dir="auto"><p id="ea341133-0f8f-8345-954c-015c3b7d1f39" class="">취합된 데이터에서 <strong>중복 제거</strong>, <strong>빈 셀 처리</strong>, <strong>날짜 형식 통일</strong> 등 데이터 정제 작업을 VBA로 자동화합니다.</p></div><div style="display:contents" dir="auto"><p id="50441133-0f8f-8237-a572-01e9001316f6" class="">
</p></div><div style="display:contents" dir="auto"><h4 id="57b41133-0f8f-837e-8b76-817e24cc9430" class="">프롬프트</h4></div><div style="display:contents" dir="auto"><pre id="61241133-0f8f-8298-8c8f-81776ae0e3cd" class="code code-wrap"><code class="language-visual-basic" style="white-space:pre-wrap;word-break:break-all">현재 시트에 취합된 데이터가 있습니다.
아래 작업을 순서대로 수행하는 VBA 코드를 작성하세요.

1. 전체 데이터 영역에서 완전히 동일한 중복 행을 제거합니다.
2. 빈 셀이 있는 행을 찾아 별도의 &quot;확인필요&quot; 시트로 이동합니다.
3. 날짜 열(C열)의 서식을 &quot;YYYY-MM-DD&quot;로 통일합니다.
4. 숫자 열(D,E열)에 텍스트로 입력된 숫자가 있으면 숫자 형식으로 변환합니다.
5. 처리 결과를 메시지박스로 표시합니다: &quot;중복 제거: N건, 확인필요: M건&quot;</code></pre></div></details></li></ul></div><div style="display:contents" dir="auto"><ul id="96a41133-0f8f-8284-b6ef-015fbddeca6d" class="toggle"><li><details open=""><summary>일일 자금일보 자동 집계 매크로</summary><div style="display:contents" dir="auto"><ul id="d4a41133-0f8f-822b-9dff-0122230c475f" class="bulleted-list"><li style="list-style-type:disc">실습자료<div style="display:contents" dir="ltr"><figure id="e1e41133-0f8f-8342-bb7c-815347d18cf8"><div class="source"><a href="%EC%83%98%ED%94%8C_%EC%9E%90%EA%B8%88%EC%9D%BC%EB%B3%B4.xlsx">샘플_자금일보.xlsx</a></div></figure></div></li></ul></div><div style="display:contents" dir="auto"><h3 id="67841133-0f8f-8375-a571-01c24326f04d" class="">실습 시나리오</h3></div><div style="display:contents" dir="auto"><p id="98641133-0f8f-834d-beeb-0128d46d7b26" class="">회계팀에서 매일 아침 본지점 35개 계좌의 입출금 데이터를 받아 자금일보를 작성합니다.</p></div><div style="display:contents" dir="auto"><ul id="55a41133-0f8f-8276-9734-01847a6abbf8" class="bulleted-list"><li style="list-style-type:disc">가용/비가용/운용 분류</li></ul></div><div style="display:contents" dir="auto"><ul id="5df41133-0f8f-829e-bebe-0154addd4cb0" class="bulleted-list"><li style="list-style-type:disc">은행별/구분별 합계 산출</li></ul></div><div style="display:contents" dir="auto"><ul id="64741133-0f8f-8249-8346-01094c4c081b" class="bulleted-list"><li style="list-style-type:disc">입출금 수식 무결성 검증 (전일잔액 + 입금 - 출금 = 당일잔액)</li></ul></div><div style="display:contents" dir="auto"><p id="afe41133-0f8f-821e-a204-81796575ab3b" class="">이 작업을 매일 30분~1시간 들여 수동으로 하던 것을 <strong>버튼 1번</strong>으로 끝내봅시다.</p></div><div style="display:contents" dir="auto"><p id="63841133-0f8f-83a5-bffd-01603ce73c68" class="">실습파일에는 의도적으로 검증실패 3건이 섞여 있습니다 (<code>비고</code> 칼럼에 &quot;검증실패예시&quot;로 표시).</p></div><div style="display:contents" dir="auto"><h3 id="c4e41133-0f8f-8375-8f43-014d5a5ca23a" class="">와우포인트</h3></div><div style="display:contents" dir="auto"><ul id="85441133-0f8f-838a-8a6d-818362064455" class="bulleted-list"><li style="list-style-type:disc">35개 계좌가 한 줄씩 노란색으로 깜빡이며 검증되는 모습이 화면에 보임</li></ul></div><div style="display:contents" dir="auto"><ul id="aee41133-0f8f-8296-abad-8174d47dec83" class="bulleted-list"><li style="list-style-type:disc">무결성 위반 3개 행이 자동으로 빨갛게 점등</li></ul></div><div style="display:contents" dir="auto"><ul id="b7041133-0f8f-834c-9184-813f88b20cbe" class="bulleted-list"><li style="list-style-type:disc">가용/비가용/운용/총합계 행이 한 줄씩 자동으로 추가되는 애니메이션</li></ul></div><div style="display:contents" dir="auto"><ul id="48641133-0f8f-837e-898c-01a630705cd8" class="bulleted-list"><li style="list-style-type:disc">상태바에 검증 진행률 실시간 표시</li></ul></div><div style="display:contents" dir="auto"><h3 id="0a741133-0f8f-839e-850c-813967aed4fc" class="">AI 프롬프트(복사해서 입력)</h3></div><div style="display:contents" dir="auto"><pre id="d0441133-0f8f-8325-9b76-01b169ef4e1f" class="code code-wrap"><code style="white-space:pre-wrap;word-break:break-all">엑셀 시트에 일일 자금일보 데이터가 있습니다.

[데이터 구조]
- 8행: 헤더 (구분, 금융기관, 계좌번호, 이율(%), 전일잔액(A), 전일잔액 정산, 입금, 출금, 당일잔액(B), 증감(B-A), 비고)
- 9행부터 마지막 데이터 행까지: 각 계좌별 입출금 데이터
- A열의 &quot;구분&quot; 값은 &quot;현금&quot;, &quot;가용&quot;, &quot;비가용&quot;, &quot;운용&quot; 중 하나

아래 작업을 수행하는 VBA 코드를 작성해주세요.

[0단계: 헬퍼 함수]
- &quot;잠깐대기(초 As Double)&quot; 함수를 별도 작성: Timer 기반 + DoEvents로 화면 갱신을 보장하면서 지정 초 대기
- 코드 시작 시 Application.ScreenUpdating = True 유지 (와우포인트용 - 속도보다 시각효과 우선)

[1단계: 검증 (화면이 보이도록 천천히 진행)]
- 9행부터 마지막 행까지 각 행을 순차적으로 검증:
  1) 현재 행 전체(A:K)를 0.05초간 노란색으로 깜빡이게 표시
  2) DoEvents로 화면 갱신
  3) (전일잔액 + 입금 - 출금)이 당일잔액과 다르면 그 행 전체를 빨간색으로 영구 표시
  4) 일치하면 노란색을 해제(흰색으로 복원)
  5) 상태바: &quot;검증중: N/총행수&quot;
- 검증 완료 후 상태바: &quot;검증완료: 불일치 N건&quot;

[2단계: 합계 자동 산출]
마지막 데이터 행 아래 빈 행 1줄 추가 후, 다음 합계 행을 차례로 추가:
  • &quot;가용 합계&quot; 행: A열 = &quot;가용 합계&quot;, E~J열에 각 항목별 SUMIF 수식으로 합계
  • &quot;비가용 합계&quot; 행
  • &quot;운용 합계&quot; 행
  • &quot;총 합계&quot; 행
각 합계 행이 추가될 때 0.3초 정도 딜레이를 주어 한 줄씩 추가되는 모습이 보이도록.
각 합계 행은 굵게 + 연파랑 배경.

[3단계: 마무리]
- 메시지박스로 다음 형식 표시:
  &quot;검증완료
  ─────────────
  ▶ 검증실패: N건
  ▶ 가용 합계: ###원
  ▶ 비가용 합계: ###원
  ▶ 운용 합계: ###원
  ▶ 총 합계: ###원&quot;
- 상태바를 False(기본값)로 복원
- ScreenUpdating 정리
- 오류 처리: On Error 시 ScreenUpdating, StatusBar 무조건 복원</code></pre></div><div style="display:contents" dir="auto"><h3 id="92441133-0f8f-8273-a23c-0116e48cc3b9" class="">결과물</h3></div><div style="display:contents" dir="auto"><p id="c4f41133-0f8f-83b2-9ca7-81605dc69b5e" class="">도형 버튼 → 매크로 지정 → 매일 raw 데이터 붙여넣고 클릭 1번으로 자금일보 완성</p></div><div style="display:contents" dir="auto"><hr id="86741133-0f8f-8291-8843-016629a57928"/></div></details></li></ul></div><div style="display:contents" dir="auto"><ul id="3fe41133-0f8f-8335-b04f-81cb824249c7" class="toggle"><li><details open=""><summary>자금운용 시계열 분석 대시보드 자동 생성</summary><div style="display:contents" dir="auto"><ul id="a6141133-0f8f-83f3-b311-819cdd523699" class="bulleted-list"><li style="list-style-type:disc">실습자료<div style="display:contents" dir="ltr"><figure id="fd141133-0f8f-8382-8df6-011d4c1ed6f4"><div class="source"><a href="%EC%83%98%ED%94%8C_%EC%9E%90%EA%B8%88%EC%9A%B4%EC%9A%A9%EC%9D%BC%EC%A7%80.xlsx">샘플_자금운용일지.xlsx</a></div></figure></div></li></ul></div><div style="display:contents" dir="auto"><h3 id="a0f41133-0f8f-83f3-bb1f-814780533c57" class="">실습 시나리오</h3></div><div style="display:contents" dir="auto"><p id="47c41133-0f8f-822a-9c17-81026fcf25cc" class="">자금팀 임원이 매월 말 &quot;이번달 운용 추이를 한 장으로 보고 싶다&quot;고 요청합니다.</p></div><div style="display:contents" dir="auto"><p id="4b441133-0f8f-8350-bb53-8110d8662172" class="">60일치 시계열 데이터를 펼쳐서 매월 1시간씩 들여 만드는 임원보고용 자료:</p></div><div style="display:contents" dir="auto"><ul id="17341133-0f8f-820c-98e0-0101892f8fb7" class="bulleted-list"><li style="list-style-type:disc">운용기관별 추이 차트</li></ul></div><div style="display:contents" dir="auto"><ul id="a1a41133-0f8f-837c-8ccb-811d911b8367" class="bulleted-list"><li style="list-style-type:disc">핵심지표(총 잔액 / 가중평균 수익률 / 누적 이자 / 일평균 잔액 / 최대운용일)</li></ul></div><div style="display:contents" dir="auto"><ul id="25f41133-0f8f-82fd-9a7a-8136b33fa747" class="bulleted-list"><li style="list-style-type:disc">이상치(잔액 급변동 ±5%) 자동 표시</li></ul></div><div style="display:contents" dir="auto"><p id="e4c41133-0f8f-83eb-8b7e-01d3bddfef6b" class="">버튼 1번에 <strong>5개 차트가 슈루룩 그려지고 핵심지표 카드 5개가 하나씩 나타나는</strong> 분석 대시보드를 만들어봅시다.</p></div><div style="display:contents" dir="auto"><h3 id="a4e41133-0f8f-83bc-b1bf-0183dbe4bbce" class="">와우포인트 (실행 약 25~30초간 영화 같은 화면)</h3></div><div style="display:contents" dir="auto"><ol type="1" id="46741133-0f8f-8331-8c9f-819bd6f26fda" class="numbered-list" start="1"><li>새 &quot;분석&quot; 시트가 탭에 등장</li></ol></div><div style="display:contents" dir="auto"><ol type="1" id="72441133-0f8f-82c8-930e-81810e563ec6" class="numbered-list" start="2"><li><strong>핵심지표 카드 5개</strong>가 0.5초 간격으로 한 개씩 노란색 깜빡이며 나타남</li></ol></div><div style="display:contents" dir="auto"><ol type="1" id="92741133-0f8f-83af-a09e-012f3a183950" class="numbered-list" start="3"><li><strong>추이 차트 5개가 슈슈슉</strong> 한 개씩 그려짐 (4개 운용기관 + 합계+수익률 콤보차트)</li></ol></div><div style="display:contents" dir="auto"><ol type="1" id="0e641133-0f8f-823e-a1b3-816eb9babad0" class="numbered-list" start="4"><li>운용일지 시트로 화면 전환되며 <strong>이상치 행이 빨갛게 점등</strong></li></ol></div><div style="display:contents" dir="auto"><ol type="1" id="70d41133-0f8f-82e8-b0c4-01fddab0a052" class="numbered-list" start="5"><li>결과 요약 메시지박스</li></ol></div><div style="display:contents" dir="auto"><blockquote id="34141133-0f8f-8305-8b11-018b3ce1a28d" class="">차트 자동 생성은 시각적 임팩트가 가장 큼 — &quot;와 진짜 자동화다&quot; 반응 보장</blockquote></div><div style="display:contents" dir="auto"><h3 id="33741133-0f8f-8302-9834-8103a8341bd9" class="">AI 프롬프트(복사해서 입력)</h3></div><div style="display:contents" dir="auto"><pre id="ceb41133-0f8f-828b-9aac-817d9da853b4" class="code code-wrap"><code style="white-space:pre-wrap;word-break:break-all">엑셀에 자금운용 시계열 시트(&quot;운용일지&quot;)가 있습니다.

[시트 구조]
- 1행: 타이틀
- 2행: 대분류 헤더 (병합 셀, A=일자, B-D=전북은행 MMDA, E-G=하나은행 MMT, H-J=OK저축은행, K-M=MMF, N-P=합계)
- 3행: 소분류 헤더 (잔액, 금리(%), 이자) — 합계 그룹의 O열은 &quot;가중평균금리(%)&quot;, P열은 &quot;이자합계&quot;
- 4행 ~ 약 63행: 60일치 일별 운용 데이터

아래 작업을 수행하는 VBA 코드를 작성해주세요.

[0단계: 헬퍼 함수]
- &quot;잠깐대기(초 As Double)&quot; 함수: Timer 기반 + DoEvents로 화면 갱신 보장하며 지정 초 대기
- 코드 시작 시 Application.ScreenUpdating = True 유지 (와우포인트용)

[1단계: 분석 시트 생성]
- &quot;분석&quot; 시트가 이미 있으면 삭제 후 새로 생성 (운용일지 시트 뒤에 추가)
- 시트 추가 후 0.8초 대기 (학생들이 새 시트 탭이 생기는 걸 보도록)
- 분석 시트로 이동
- A1:G1 병합 후 &quot;월간 자금운용 분석 대시보드&quot; (폰트 20pt, 굵게, 흰글씨, 가운데, 진남색 배경)
- A2:G2 병합 후 &quot;기준기간: 운용일지 첫 일자 ~ 마지막 일자&quot; (폰트 11pt, 회색)

[2단계: 핵심지표 카드 5개 자동 생성 (한 카드씩 나타나는 효과)]
A4 ~ G8 영역에 카드형 5개를 가로로 배치 (각 카드 = 2행 x 적당한 폭)
다음 5개 지표를 한 카드씩 0.5초 간격으로 채움:
  1) 총 운용잔액(최종일 기준) — 운용일지 N열 마지막 값, &quot;###억원&quot; 표시
  2) 가중평균 수익률(60일 평균) — O열 평균, &quot;##.##%&quot;
  3) 누적 이자수익 — P열 합계, &quot;###억원&quot;
  4) 일평균 운용잔액 — N열 평균, &quot;###억원&quot;
  5) 최대 운용일자 — N열 최댓값 해당 일자, &quot;yyyy-mm-dd&quot;

각 카드 사양:
  - 윗줄(작은 글씨, 폰트 9pt): 지표명
  - 아랫줄(큰 글씨, 폰트 20pt 굵게): 값
  - 카드 배경: 5개 카드 각각 다른 파스텔색 (연파랑/연초록/연노랑/연분홍/연보라)
  - 카드 외곽선
  - 등장 시 효과: 카드 배경을 흰색 → 노란색 깜빡 → 본래색 으로 0.3초 페이드인
  - 상태바: &quot;[N/5] 핵심지표 카드 생성중...&quot;

[3단계: 운용기관별 차트 5개 자동 생성 (한 개씩 나타나는 효과)]
다음 5개 차트를 분석 시트에 추가하되 한 차트씩 0.8초 간격으로 나타나게:
  1) 전북은행 MMDA 잔액 추이 — 운용일지 A4:A끝(일자) + B4:B끝(잔액), 라인차트
  2) 하나은행 MMT 잔액 추이 — E열, 라인차트
  3) OK저축은행 잔액 추이 — H열, 영역차트
  4) MMF 잔액 추이 — K열, 라인차트
  5) 합계 잔액 + 가중평균 수익률 — N열(잔액) 막대 + O열(수익률) 보조축 라인 — 콤보차트

각 차트 사양:
  - 크기: 약 가로 380 x 세로 220
  - 차트 제목: &quot;전북은행 MMDA 일별 잔액 추이&quot; 등
  - 분석 시트에 가로 2개씩 정렬:
      • 1·2번 차트: 행 10 부근, 좌우 배치
      • 3·4번 차트: 행 22 부근
      • 5번 차트: 행 34 부근, 가로 두 칸 폭(약 800)
  - 차트 추가 후 0.8초 대기로 한 차트씩 등장
  - 상태바: &quot;[N/5] 차트 생성중: [기관명]...&quot;

[4단계: 이상치 자동 탐지 + 원본 시계열에 점등 표시]
- 운용일지 시트로 잠깐 이동 (Application.Goto, Scroll:=True)
- 5행부터 마지막 행까지 순회하며 N열(합계 잔액) 직전일 대비 변동률 검사
- 변동률 절댓값이 5% 이상이면 그 행 전체(A:P)를 빨간색 배경으로 영구 표시
- 이상치 발견 시 그 행을 1초간 노랑 → 빨강으로 깜빡이며 화면에 보이게
- 상태바: &quot;이상치 탐지중: N/총행수 (변동률 ±5% 기준)&quot;

[5단계: 마무리]
- 분석 시트로 이동, A1으로 스크롤하여 결과를 한 화면에 보이게
- A40 부근에 &quot;★ 이상치 N건 탐지 (변동률 ±5% 이상)&quot; 빨간 텍스트 추가
- 메시지박스로:
  &quot;분석 대시보드 생성 완료
  ─────────────
  ▶ 핵심지표 카드: 5개
  ▶ 추이 차트: 5개
  ▶ 이상치 탐지: N건
  ▶ 분석 시트: 새로 생성됨&quot;
- 상태바·ScreenUpdating 복원
- 오류 처리: On Error 시 ScreenUpdating·StatusBar 정리</code></pre></div><div style="display:contents" dir="auto"><h3 id="22041133-0f8f-8221-9813-0172be8800a8" class="">결과물</h3></div><div style="display:contents" dir="auto"><p id="f9c41133-0f8f-8313-8215-8106463dedec" class="">매월 말 버튼 1번 → &quot;분석&quot; 시트에 임원보고용 한 장짜리 대시보드 자동 생성</p></div><div style="display:contents" dir="auto"><p id="3d641133-0f8f-827f-b8d5-819eaf837415" class="">1시간 수동작업 → 30초 자동화</p></div><div style="display:contents" dir="auto"><hr id="5c041133-0f8f-8236-9999-8166498d615d"/></div></details></li></ul></div><div style="display:contents" dir="auto"><ul id="9f441133-0f8f-83e6-aeda-8183b8158b66" class="toggle"><li><details open=""><summary>신탁 월간보고서 자동 생성</summary><div style="display:contents" dir="auto"><ul id="18741133-0f8f-837c-a712-016fb4955861" class="bulleted-list"><li style="list-style-type:disc">실습자료<div style="display:contents" dir="ltr"><figure id="60a41133-0f8f-83ea-ba4a-019dc2fd0302"><div class="source"><a href="%EC%83%98%ED%94%8C_%EC%8B%A0%ED%83%81%EB%B3%B4%EA%B3%A0%EC%84%9C.xlsx">샘플_신탁보고서.xlsx</a></div></figure></div></li></ul></div><div style="display:contents" dir="auto"><h3 id="a4041133-0f8f-832e-871f-815e590694e6" class="">실습 시나리오</h3></div><div style="display:contents" dir="auto"><p id="80541133-0f8f-824a-bacb-017096a20e1a" class="">매월 신탁사가 대주에게 보내는 월간보고서는 6시트가 서로 연결된 표준 양식입니다.</p></div><div style="display:contents" dir="auto"><p id="51141133-0f8f-83ac-862d-011aaf5efec5" class="">매월 변하는 값(차입정보·계산기간·회수액·자금보충액·이자율)만 입력하면 5개 보고 시트가 자동 작성되도록 만듭시다.</p></div><div style="display:contents" dir="auto"><p id="22f41133-0f8f-8349-9aed-817d842dcd3b" class="">이 강의는 <strong>두 단계 프롬프트</strong>로 구성됩니다:</p></div><div style="display:contents" dir="auto"><ol type="1" id="de941133-0f8f-827b-9fff-8111d82b7bac" class="numbered-list" start="1"><li>1단계: 차입정보로 상환계획표 13회차 자동 생성</li></ol></div><div style="display:contents" dir="auto"><ol type="1" id="d5c41133-0f8f-83a3-a2d5-81e9c78169f1" class="numbered-list" start="2"><li>2단계: 거래내역 raw 데이터 분석 + 다중 시트 보고서 일괄 채움</li></ol></div><div style="display:contents" dir="auto"><h3 id="ab941133-0f8f-83ff-bb1d-0128a2474e82" class="">와우포인트</h3></div><div style="display:contents" dir="auto"><ul id="b5241133-0f8f-8379-81fa-01ab5b2aafe1" class="bulleted-list"><li style="list-style-type:disc">1단계: 상환계획표가 한 회차씩 채워지는 모습 (총 13회차 영화처럼 진행)</li></ul></div><div style="display:contents" dir="auto"><ul id="8fc41133-0f8f-833e-87e6-01c6803adce5" class="bulleted-list"><li style="list-style-type:disc">2단계: <strong>거래내역 시트의 193건 raw 데이터</strong>가 한 건씩 자동 분류되며 색칠 (회수=파랑, 자금보충=노랑)</li></ul></div><div style="display:contents" dir="auto"><ul id="c7041133-0f8f-8309-aedc-01bbe29f8fcf" class="bulleted-list"><li style="list-style-type:disc">3개 보고서 시트가 화면 전환되며 한 시트씩 자동으로 채워지는 영화 효과</li></ul></div><div style="display:contents" dir="auto"><ul id="f6441133-0f8f-8360-8ae5-81040331a10c" class="bulleted-list"><li style="list-style-type:disc">마지막 메시지박스에 거래 분류 결과 자동 집계</li></ul></div><div style="display:contents" dir="auto"><h3 id="36241133-0f8f-82c9-ade8-01cc34f62bef" class="">1단계 AI 프롬프트 — 상환계획표 자동 생성</h3></div><div style="display:contents" dir="auto"><pre id="f0f41133-0f8f-827e-a98f-817032841d51" class="code code-wrap"><code style="white-space:pre-wrap;word-break:break-all">엑셀 파일에 다음 두 시트가 있습니다.

[입력 시트]
- B4: 차입일 (날짜)
- B5: 만기일 (날짜)
- B6: 차입금액 (원, 약 521억)
- B7: 고정금리 (%, 5.50)

[상환계획표 시트]
- 5행: 헤더 (회차 / 차입잔액 / 예상지급일 / 이자기간 From / 이자기간 To / 일수 / 이율(%) / 원금상환 / 추가상환 / 이자금액 / 실지급금액)
- 6행부터: 매크로로 자동 채울 영역

아래 작업을 수행하는 VBA 코드를 작성해주세요.

[상환 조건]
- 상환방식: 원금불균등분할상환 (매월 10일 지급)
- 차입일부터 만기일까지 매월 10일을 회차별 지급일로 함
- 회차별 원금상환액은 약 (차입금액 / 회차수)에 가까운 금액 (10백만 단위 반올림)
- 마지막 회차는 잔액 전액 상환
- 이자 = 직전잔액 × 금리(%) × 일수 / 365 / 100

[화면 효과 (와우포인트)]
- &quot;잠깐대기(초)&quot; 헬퍼 함수 사용 (Timer + DoEvents)
- Application.ScreenUpdating = True 유지
- 회차별로 한 행씩 채워지는 모습이 보이도록 각 회차 입력 후 0.2초 대기
- 채우는 중인 행은 연노랑으로 깜빡이고, 채움이 끝나면 흰색으로 복원
- 상태바: &quot;상환계획표 생성중: N/총회차&quot;

[마무리]
- 마지막 행 다음에 &quot;합계&quot; 행 추가 (원금상환·추가상환·이자·실지급 합계)
- 합계 행은 굵게 + 연파랑 배경
- 메시지박스로 &quot;상환계획표 N회차 생성 완료&quot; 표시
- 오류 처리 포함</code></pre></div><div style="display:contents" dir="auto"><h3 id="5a641133-0f8f-8333-8a69-81d154110129" class="">2단계 AI 프롬프트 — 거래내역 분석 + 다중 시트 보고서 채움</h3></div><div style="display:contents" dir="auto"><pre id="bcf41133-0f8f-8276-ada9-01c29ad8a1e5" class="code code-wrap"><code style="white-space:pre-wrap;word-break:break-all">엑셀 파일에 다음 시트가 있습니다.

[입력 시트]
- B11: 계산초일 (예: 2026-03-01)
- B12: 계산말일 (예: 2026-03-31)
- B13: 이자기간(일)
- B14: 당월 회수액(원) — 거래내역에서 자동 산출되도록 변경 예정
- B15: 자금보충액(원) — 거래내역에서 자동 산출되도록 변경 예정
- B16: 권면액 잔액(전월말, 원)
- B17: 이자율(%)
- B18: 수익지급일 (날짜)
- B19: 회차
- B20: 권면 상환액(원)

[거래내역 시트] (3행이 헤더, 4행부터 약 200건의 raw 거래)
- 칼럼: 순번 / 거래일시 / 출금금액 / 입금금액 / 잔액 / 거래내용 / 상대은행 / 거래구분
- &quot;신용회복위원회&quot; 거래내용 = 신용회복 회수액 (펌뱅킹)
- &quot;A캐피탈(자금보충)&quot; 거래내용 = 자금보충액 (타행이체)

[채울 시트들]
- 신탁보고서: 9~15행 B열에 일자/금액 채움, 19~21행에 입금·지급 합계
- 명세서: 4행에 권면액잔액·이자율·상환액·이자·입금액(상환+이자)
- 송금내역: 4행 C열에 송금액(=상환+이자)

아래 작업을 수행하는 VBA 코드를 작성해주세요.

[헬퍼 함수]
- &quot;잠깐대기(초)&quot; 함수 (Timer + DoEvents)
- 코드 시작 시 Application.ScreenUpdating = True

[1단계: 거래내역에서 자동 분류 (와우포인트)]
- 거래내역 시트로 화면 이동 (Application.Goto Scroll:=True)
- 거래내역 시트를 순회하며 거래일시가 계산초일~계산말일 사이인 거래만 집계:
  • &quot;신용회복위원회&quot; 입금 합계 → 입력 시트 B14 (회수액)
  • &quot;A캐피탈&quot; 자금보충 입금 합계 → B15
- 분류 진행 시 분류 대상이 된 행을 연파랑(회수)/연노랑(자금보충)으로 표시
- 각 행 처리마다 0.02초 대기로 화면이 업데이트되는 모습 보이게
- 상태바: &quot;거래내역 분류중: N/총건수&quot;

[2단계: 보고서 시트 한 장씩 자동 채움 (와우포인트)]
- 신탁보고서 → 명세서 → 송금내역 시트를 순서대로 처리
- 각 시트로 이동 후 1초 대기 → 학생들이 어느 시트가 채워지는지 보이게
- 각 시트의 셀을 채울 때 한 셀당 0.1초 대기 (영화 같은 효과)
- 채워지는 셀은 연초록 배경으로 잠깐 깜빡임
- 상태바: &quot;신탁보고서 채우는 중...&quot;, &quot;명세서 채우는 중...&quot; 등

[계산 산식]
- 이자금액 = 권면액잔액(전월말) × 이자율(%) × 이자기간 / 365 / 100
- 입금액 = 권면 상환액 + 이자금액
- 신탁보고서 입금합계 = 회수액 + 자금보충액
- 신탁보고서 지급합계 = 권면 상환액 + 이자금액

[3단계: 마무리]
- 마지막에 입력 시트로 돌아와서 메시지박스로:
  &quot;보고서 생성 완료
  ─────────────
  ▶ 신용회복 회수액: ###원 (N건)
  ▶ 자금보충액: ###원 (M건)
  ▶ 1종 수익권 이자: ###원
  ▶ 입금 합계: ###원
  ▶ 지급 합계: ###원&quot;
- 시트 강조용 임시 색상 모두 원래대로 복원
- 상태바·ScreenUpdating 복원
- 오류 처리 포함</code></pre></div><div style="display:contents" dir="auto"><h3 id="18241133-0f8f-8209-bbb6-81c3a9cf9536" class="">결과물</h3></div><div style="display:contents" dir="auto"><p id="1bc41133-0f8f-8226-9cda-81f9d37e4cec" class="">입력 시트 1장만 채우면 6시트 보고서 일괄 자동 생성 (매월 1~3시간 작업 → 1분 이내)</p></div><div style="display:contents" dir="auto"><hr id="52241133-0f8f-83c0-9e5e-81a87ea70635"/></div></details></li></ul></div><div style="display:contents" dir="auto"><ul id="47141133-0f8f-8303-a86d-817b24e0e25e" class="toggle"><li><details open=""><summary>Excel → Word 투자신청서 자동 생성</summary><div style="display:contents" dir="auto"><ul id="aad41133-0f8f-82a7-98b4-810aaf14fd34" class="bulleted-list"><li style="list-style-type:disc">실습자료<div style="display:contents" dir="ltr"><figure id="47041133-0f8f-831f-b87f-81c075457277"><div class="source"><a href="%EC%83%98%ED%94%8C_%ED%88%AC%EC%9E%90%EC%8B%A0%EC%B2%AD%EC%84%9C_%EC%96%91%EC%8B%9D.docx">샘플_투자신청서_양식.docx</a></div></figure></div><div style="display:contents" dir="ltr"><figure id="dc341133-0f8f-8267-999c-01ef0f5ed8a0"><div class="source"><a href="%EC%83%98%ED%94%8C_%ED%88%AC%EC%9E%90%EC%8B%A0%EC%B2%AD%EC%84%9C_%EC%A2%85%EB%AA%A9%EC%9E%85%EB%A0%A5.xlsx">샘플_투자신청서_종목입력.xlsx</a></div></figure></div><div style="display:contents" dir="auto"><blockquote id="87241133-0f8f-82b6-a051-01a3d6c5e24f" class="">두 파일을 같은 폴더에 두고 실습 (<code>[종목명]</code>, <code>[매수수량]</code> 등 placeholder 8개 포함된 Word 양식)</blockquote></div></li></ul></div><div style="display:contents" dir="auto"><h3 id="59041133-0f8f-8245-8176-817c3fc0a374" class="">실습 시나리오</h3></div><div style="display:contents" dir="auto"><p id="c3c41133-0f8f-8295-af0f-8100aed87060" class="">유가증권 투자(블록딜 등) 결재문서는 매번 동일한 Word 양식에 종목명·수량·금액만 바뀝니다.</p></div><div style="display:contents" dir="auto"><p id="9d141133-0f8f-826a-9c9b-8100dab0f9a8" class="">한도관리(자기자본 × 50% 또는 20%, 등급에 따라 차등)도 매번 산식 계산이 필요합니다.</p></div><div style="display:contents" dir="auto"><p id="7ec41133-0f8f-823a-89b6-0183e66f5cc0" class="">Excel에 종목 정보만 입력 → 버튼 클릭 → Word 결재문서 자동 생성·저장 매크로를 만듭시다.</p></div><div style="display:contents" dir="auto"><p id="e6741133-0f8f-8337-b351-0161c39b329d" class="">이번 강의는 VBA로 <strong>Excel과 Word 두 프로그램을 연동</strong>하는 게 핵심입니다.</p></div><div style="display:contents" dir="auto"><h3 id="20f41133-0f8f-8381-b762-81ffd7620c03" class="">와우포인트</h3></div><div style="display:contents" dir="auto"><ul id="bc441133-0f8f-82a9-9761-81ba77ef9086" class="bulleted-list"><li style="list-style-type:disc">Excel 입력 셀이 차례로 초록불 들어오며 읽힘</li></ul></div><div style="display:contents" dir="auto"><ul id="d6341133-0f8f-834b-9b2a-0140d23611f6" class="bulleted-list"><li style="list-style-type:disc"><strong>Word가 진짜로 화면에 떠오른</strong> 다음</li></ul></div><div style="display:contents" dir="auto"><ul id="a1141133-0f8f-8263-b9ec-012be1349a53" class="bulleted-list"><li style="list-style-type:disc">placeholder 8개가 1초 간격으로 실제 값으로 실시간 교체되는 모습이 학생 눈앞에 보임</li></ul></div><div style="display:contents" dir="auto"><ul id="9e341133-0f8f-835a-a155-81313a4d938c" class="bulleted-list"><li style="list-style-type:disc">한도초과 시 빨간 경고 메시지박스</li></ul></div><div style="display:contents" dir="auto"><ul id="93341133-0f8f-8391-8b2d-81cef03f2c34" class="bulleted-list"><li style="list-style-type:disc">학생 반응: &quot;와 진짜 결재 시스템 같다&quot;</li></ul></div><div style="display:contents" dir="auto"><h3 id="8db41133-0f8f-8240-adfb-01e63d0685a7" class="">AI 프롬프트(복사해서 입력)</h3></div><div style="display:contents" dir="auto"><pre id="52641133-0f8f-8329-baa7-013b73dce67a" class="code code-wrap"><code style="white-space:pre-wrap;word-break:break-all">엑셀 VBA로 Excel 데이터를 Word 양식 파일에 자동으로 채워 새로운 Word 문서를 생성하는 코드를 작성해주세요.

[Excel &quot;종목입력&quot; 시트]
- B4: 매수종목명 (예: iM금융지주)
- B5: 매수수량 (주)
- B6: 매수종가 (원)
- B7: 매매금액 (원)
- B8: 자기자본 (억원)
- B9: 동종목 기존 보유금액 (억원)
- B10: 신용등급 (AAA, AA+, AA-, A, BBB 등)
- B11: 신청일자
- B16: 동일회사 한도 (억원, 수식 자동산출 — 그냥 읽기만)
- B17: 취급후 총 사용금액 (억원, 수식 자동산출)
- B18: 적정여부 (수식 자동산출 — &quot;적정&quot; 또는 &quot;한도초과&quot;)

[Word 양식 파일] - 같은 폴더의 &quot;샘플_투자신청서_양식.docx&quot;
- 본문에 다음 placeholder 텍스트가 있음:
  [종목명], [매수수량], [매수종가], [매매금액], [동일회사한도], [기존보유], [취급후총사용금액], [적정여부]

[헬퍼 함수]
- &quot;잠깐대기(초)&quot; 함수 (Timer + DoEvents)
- 코드 시작 시 Application.ScreenUpdating = True

[1단계: 입력값 읽기 (화면 효과)]
- B4부터 B11까지 각 셀을 차례로 연초록으로 잠깐 깜빡이며(0.15초) 읽음
- 상태바: &quot;종목정보 읽는 중: 매수종목명...&quot; 등

[2단계: 한도검증]
- 적정여부가 &quot;한도초과&quot;면 빨간색 메시지박스로 경고 후
  &quot;그래도 신청서를 생성하시겠습니까?&quot; Yes/No 질문
- No면 종료

[3단계: Word 양식 열기 (와우포인트 핵심)]
- CreateObject(&quot;Word.Application&quot;)으로 Word 앱 생성
- objWord.Visible = True 로 두어 문서가 화면에 보이도록
- 양식 파일을 Documents.Open으로 열기
- 1초 대기 (학생들이 Word가 떠오르는 걸 보도록)

[4단계: placeholder 한 개씩 교체 (Find/Replace, 화면 효과)]
다음 placeholder를 순서대로 교체:
  [종목명] → 매수종목명
  [매수수량] → 매수수량 (#,##0주 형식)
  [매수종가] → 매수종가 (#,##0원 형식)
  [매매금액] → 매매금액 (#,##0원 형식, 약 ###억원 부기)
  [동일회사한도] → ###억원
  [기존보유] → ###억원
  [취급후총사용금액] → ###억원
  [적정여부] → &quot;적정&quot; 또는 &quot;한도초과&quot;

각 교체 사이에 1초씩 대기 → 학생들이 Word 화면에서 placeholder가 한 개씩 사라지고 실제 값으로 바뀌는 걸 봄
상태바: &quot;[N/8] 종목명 채우는 중...&quot; 등 진행상황 표시

[5단계: 새 파일로 저장 + 알림]
- 저장 경로: 엑셀 파일과 같은 폴더에 &quot;투자신청서_[종목명]_[YYYYMMDD].docx&quot; 형식
- 저장 후 메시지박스로 &quot;Word 문서 생성 완료
  저장 경로: ...&quot; 표시
- Word 앱은 닫지 않고 띄워둠 (사용자가 결과 확인 가능)
- 적정여부가 &quot;한도초과&quot;였으면 빨간색 메시지박스로 다시 한 번 경고

[기타]
- ScreenUpdating = True 유지
- Word 객체 변수는 명시적으로 해제 (Set objWord = Nothing)
- 오류 처리: Word 앱은 무조건 정리 (On Error GoTo)</code></pre></div><div style="display:contents" dir="auto"><h3 id="f8541133-0f8f-83ac-9567-813ae21c35dc" class="">결과물</h3></div><div style="display:contents" dir="auto"><p id="af041133-0f8f-83a2-97a9-01e8ea451859" class="">Excel에 종목정보 입력 → 버튼 클릭 → Word 결재문서가 화면에 떠오르고 자동 작성 → 저장 완료</p></div><div style="display:contents" dir="auto"><p id="43641133-0f8f-8304-bf58-81be525224df" class="">결재 1건 작성 시간 30분 → 1분</p></div><div style="display:contents" dir="auto"><hr id="3cb41133-0f8f-82d2-8a8b-813a12d359b1"/></div></details></li></ul></div><div style="display:contents" dir="auto"><ul id="28e41133-0f8f-834b-b09e-81cc12743b26" class="toggle"><li><details open=""><summary>시트 이벤트 실습</summary><div style="display:contents" dir="auto"><h3 id="cd341133-0f8f-8381-98a9-81c2204ae9b4" class="">실습파일</h3></div><div style="display:contents" dir="ltr"><figure id="2e741133-0f8f-82f0-8e32-81f6accdda47"><div class="block-color-yellow_background source"><a href="%EC%8B%9C%ED%8A%B8_%EC%9D%B4%EB%B2%A4%ED%8A%B8%EC%8B%A4%EC%8A%B5.xlsx">시트_이벤트실습.xlsx</a></div></figure></div><div style="display:contents" dir="auto"><p id="f8641133-0f8f-827d-aab1-011f40f30928" class="">
</p></div><div style="display:contents" dir="auto"><p id="f2641133-0f8f-82be-ba17-81578c764965" class="">피벗 새로고침처럼 <strong>시트 이벤트(자동 실행)</strong> 로 구현하면, 버튼 없이도 “업무 흐름 자체”가 자동화됩니다.</p></div><div style="display:contents" dir="auto"><ul id="57841133-0f8f-8276-b95c-81f652eaf593" class="toggle"><li><details open=""><summary>1) 시트 생성 시(새 시트 추가) 자동 서식/헤더 세팅 (Workbook 이벤트)</summary><div style="display:contents" dir="auto"><ul id="e2641133-0f8f-8349-beaa-81b883fff05f" class="bulleted-list"><li style="list-style-type:disc">상황: 매달/매주 새 시트를 만들 때마다 헤더/필터/서식 세팅을 반복</li></ul></div><div style="display:contents" dir="auto"><ul id="69741133-0f8f-8302-a51a-01f27a90becd" class="bulleted-list"><li style="list-style-type:disc">이벤트: 새 시트가 생성되는 순간 자동 실행</li></ul></div><div style="display:contents" dir="auto"><ul id="d1f41133-0f8f-828c-84d5-011fe5b50801" class="bulleted-list"><li style="list-style-type:disc">효과: 표준 양식이 자동으로 만들어져서 실수(누락/오타)를 줄임</li></ul></div><div style="display:contents" dir="auto"><h3 id="87d41133-0f8f-828f-8183-8156692441e1" class="">프롬프트</h3></div><div style="display:contents" dir="auto"><pre id="77041133-0f8f-8392-8249-012cd30a6407" class="code code-wrap"><code class="language-visual-basic" style="white-space:pre-wrap;word-break:break-all">엑셀 VBA에서 &quot;새 시트가 추가될 때&quot; 자동으로 보고서 양식을 세팅하는 이벤트 코드를 작성해줘.

[요구사항]
- ThisWorkbook 모듈에 넣을 이벤트로 작성해줘 (Workbook_NewSheet)
- 동작 내용:
  1) 1행에 헤더 자동 입력: 날짜, 부서, 항목, 값, 비고
  2) 1행을 굵게 + 배경색 연회색
  3) 1행에 필터 적용
  4) A열은 날짜 서식(yyyy-mm-dd)
  5) D열은 천단위 콤마 숫자 서식
  6) 표 범위는 사용자가 입력하면 자동 확장되도록(테이블로 변환)까지 가능하면 적용
- 샘플 데이터를 2행 미리 생성해줘
- 마지막에 A2를 선택해줘
- 오류 처리 포함</code></pre></div></details></li></ul></div><div style="display:contents" dir="auto"><ul id="06041133-0f8f-826c-9c54-8178da7d82bd" class="toggle"><li><details open=""><summary>2) 우클릭(오른쪽 클릭) 시 ‘행 상태 변경’ 빠른처리 (Worksheet_BeforeRightClick)</summary><div style="display:contents" dir="auto"><ul id="50c41133-0f8f-8207-8807-81626ad26b26" class="bulleted-list"><li style="list-style-type:disc">상황: 접수/처리중/완료 같은 상태를 마우스로 매번 드롭다운/색칠하기 번거로움</li></ul></div><div style="display:contents" dir="auto"><ul id="b6a41133-0f8f-834e-b554-81a4b95a6367" class="bulleted-list"><li style="list-style-type:disc">이벤트: 특정 열에서 우클릭하면 팝업 메뉴로 상태를 즉시 변경</li></ul></div><div style="display:contents" dir="auto"><ul id="98841133-0f8f-8237-8ae3-818ce4b69c0e" class="bulleted-list"><li style="list-style-type:disc">효과: 현업이 “클릭 2번”으로 업데이트</li></ul></div><div style="display:contents" dir="auto"><h3 id="0a141133-0f8f-8297-bb4b-81de3144bc8d" class="">프롬프트</h3></div><div style="display:contents" dir="auto"><pre id="60c41133-0f8f-821e-a56d-81866b88f16d" class="code code-wrap"><code class="language-visual-basic" style="white-space:pre-wrap;word-break:break-all">엑셀 VBA로 우클릭 이벤트를 활용해서 상태(Status) 값을 빠르게 변경하는 기능을 만들어줘.

[대상 시트]
- 시트명: &quot;업무목록&quot;
- A열: 업무명
- B열: 담당자
- C열: 상태 (&quot;접수&quot;, &quot;처리중&quot;, &quot;완료&quot;)

[요구사항]
- &quot;업무목록&quot; 시트 코드(Worksheet 모듈)에 넣는 이벤트로 작성
- 사용자가 C열의 셀을 우클릭하면 기본 우클릭 메뉴가 뜨지 않게 막고(Cancel=True)
- InputBox(또는 간단한 선택 UI)로 상태를 선택하게 한 뒤 해당 셀 값을 변경
- 상태별로 행 전체에 색상 적용:
  - 접수: 노랑
  - 처리중: 연파랑
  - 완료: 연초록
- 다른 열을 우클릭하면 아무 동작도 하지 않기
- 오류 처리 포함</code></pre></div></details></li></ul></div><div style="display:contents" dir="auto"><ul id="08b41133-0f8f-836e-bf3d-01a8a36f2740" class="toggle"><li><details open=""><summary>3) 더블클릭 시 상세 입력 폼 열기 + 해당 행 자동완성 (Worksheet_BeforeDoubleClick)</summary><div style="display:contents" dir="auto"><ul id="73e41133-0f8f-835b-a948-0118f8ca3e9f" class="bulleted-list"><li style="list-style-type:disc">상황: 목록에서 더블클릭하면 상세 입력(비고/처리내용/완료일)을 빠르게 남기고 싶음</li></ul></div><div style="display:contents" dir="auto"><ul id="14a41133-0f8f-8335-bd37-81b39c7cb983" class="bulleted-list"><li style="list-style-type:disc">이벤트: 더블클릭 시 폼(입력창) 실행</li></ul></div><div style="display:contents" dir="auto"><ul id="ef841133-0f8f-82d6-aaff-81512b7b8c5d" class="bulleted-list"><li style="list-style-type:disc">효과: “목록 → 상세 입력”이 자연스러운 UI처럼 동작</li></ul></div><div style="display:contents" dir="auto"><h3 id="ffe41133-0f8f-836b-907e-01158989777d" class="">프롬프트</h3></div><div style="display:contents" dir="auto"><pre id="43041133-0f8f-82a5-946c-8132200968d7" class="code code-wrap"><code class="language-visual-basic" style="white-space:pre-wrap;word-break:break-all">엑셀 VBA로 더블클릭 이벤트를 활용해 &quot;상세 입력&quot;을 빠르게 기록하는 기능을 만들어줘.

[대상 시트]
- 시트명: &quot;업무목록&quot;
- A열: 업무명
- B열: 담당자
- C열: 상태
- D열: 비고(상세내용)
- E열: 완료일

[요구사항]
- &quot;업무목록&quot; 시트의 A열(업무명)을 더블클릭했을 때만 동작
- 기본 편집 모드로 들어가지 않게 Cancel=True
- InputBox 2개를 순서대로 띄워서
  1) 비고(상세내용)
  2) 완료 여부(Y/N)
- 비고는 해당 행 D열에 저장
- 완료 여부가 Y면
  - 상태를 &quot;완료&quot;로 변경(C열)
  - 완료일을 오늘 날짜로 입력(E열)
- 완료 여부가 N이면 상태를 &quot;처리중&quot;으로 변경
- 마지막에 해당 행을 화면 중앙에 보이도록 스크롤(선택) 처리
- 오류 처리 포함</code></pre></div></details></li></ul></div></details></li></ul></div></div></figure></div><div style="display:contents" dir="ltr"><figure class="block-color-default_background callout" style="white-space:pre-wrap;display:flex" id="36841133-0f8f-8224-b02c-016bc9cbeca5"><div style="width:100%"><div style="display:contents" dir="auto"><h3 id="36a41133-0f8f-83d5-9ce7-018e67e31127" class="">3️⃣ Selenium 을 활용한 Web Browser 자동화</h3></div><div style="display:contents" dir="auto"><hr id="e5341133-0f8f-824c-98a6-018d8bf0117c"/></div><div style="display:contents" dir="auto"><ul id="44f41133-0f8f-8226-8066-81bd371b927b" class="toggle"><li><details open=""><summary>Selenium 소개</summary><div style="display:contents" dir="auto"><p id="d7b41133-0f8f-83f2-945e-016e64fca71a" class="">Selenium은 웹 브라우저를 프로그래밍으로 제어할 수 있게 해주는 자동화 도구입니다. </p></div><div style="display:contents" dir="auto"><p id="0a341133-0f8f-824c-ab42-016d4d5afce2" class="">주로 다음과 같은 용도로 사용됩니다:</p></div><div style="display:contents" dir="auto"><ul id="dbc41133-0f8f-823d-a790-8113cddfc166" class="bulleted-list"><li style="list-style-type:disc">웹 테스트 자동화: 웹사이트의 기능을 자동으로 테스트</li></ul></div><div style="display:contents" dir="auto"><ul id="d7e41133-0f8f-828f-8dd6-01b817695a12" class="bulleted-list"><li style="list-style-type:disc">데이터 수집: 웹사이트의 정보를 자동으로 수집(웹 스크래핑)</li></ul></div><div style="display:contents" dir="auto"><ul id="ac841133-0f8f-82fe-ba4b-012309f0fbbf" class="bulleted-list"><li style="list-style-type:disc">반복 작업 자동화: 웹 브라우저에서 수행하는 반복적인 작업을 자동화</li></ul></div><div style="display:contents" dir="auto"><p id="16541133-0f8f-82d8-b4ec-81c66d6a95d5" class="">
</p></div><div style="display:contents" dir="auto"><p id="3ab41133-0f8f-8225-83a6-01b7e9fefae0" class="">Selenium의 주요 특징</p></div><div style="display:contents" dir="auto"><ul id="47b41133-0f8f-8352-817b-817c113faad6" class="bulleted-list"><li style="list-style-type:disc"><strong>다양한 브라우저 지원:</strong> Chrome, Firefox, Safari 등 대부분의 웹 브라우저와 호환<div style="display:contents" dir="auto"><ul id="ea841133-0f8f-8254-9d8d-01935870c687" class="bulleted-list"><li style="list-style-type:circle">강의에서는 Chrome 브라우저를 활용합니다.</li></ul></div></li></ul></div><div style="display:contents" dir="auto"><ul id="2c041133-0f8f-83cf-ade8-810832342ffd" class="bulleted-list"><li style="list-style-type:disc"><strong>여러 프로그래밍 언어:</strong> Python, Java, JavaScript 등 다양한 언어로 사용 가능<div style="display:contents" dir="auto"><ul id="afb41133-0f8f-83e3-8a2c-014423bd24b3" class="bulleted-list"><li style="list-style-type:circle">강의에서는 VBA 언어를 활용합니다.</li></ul></div></li></ul></div><div style="display:contents" dir="auto"><ul id="fb741133-0f8f-8332-aa96-01c2a45fd496" class="bulleted-list"><li style="list-style-type:disc"><strong>실제 브라우저 제어:</strong> 실제 사용자처럼 브라우저를 조작할 수 있음</li></ul></div><div style="display:contents" dir="auto"><p id="bdc41133-0f8f-832a-a12b-0143c4bbe6c9" class="">
</p></div><div style="display:contents" dir="auto"><p id="6fd41133-0f8f-839b-a8c9-8130abcf862d" class="">Selenium이 수행할 수 있는 작업들</p></div><div style="display:contents" dir="auto"><ul id="41941133-0f8f-82cc-8c6c-010bdd8b13b2" class="bulleted-list"><li style="list-style-type:disc">웹페이지 접속 </li></ul></div><div style="display:contents" dir="auto"><ul id="6df41133-0f8f-821a-b5bd-012698a38557" class="bulleted-list"><li style="list-style-type:disc">화면의 텍스트 읽기, 이미지 다운로드  등 정보 수집</li></ul></div><div style="display:contents" dir="auto"><ul id="67041133-0f8f-835b-9856-815ece9d65ab" class="bulleted-list"><li style="list-style-type:disc">버튼 클릭, 텍스트 입력 등 작업 자동화</li></ul></div><div style="display:contents" dir="auto"><ul id="53141133-0f8f-8309-bcfd-81c9c98a0c06" class="bulleted-list"><li style="list-style-type:disc">폼 입력 및 제출</li></ul></div><div style="display:contents" dir="auto"><ul id="e1741133-0f8f-831a-8f98-01291029b1e5" class="bulleted-list"><li style="list-style-type:disc">스크린샷 캡처</li></ul></div><div style="display:contents" dir="auto"><ul id="a0f41133-0f8f-82e7-b00b-01a2737ca19a" class="bulleted-list"><li style="list-style-type:disc">JavaScript 코드 실행</li></ul></div><div style="display:contents" dir="auto"><ul id="faa41133-0f8f-83f5-af4b-01ee5fe90402" class="bulleted-list"><li style="list-style-type:disc">팝업창 처리 등</li></ul></div><div style="display:contents" dir="auto"><p id="7f641133-0f8f-837f-b093-0126288b7de6" class="">
</p></div></details></li></ul></div><div style="display:contents" dir="auto"><ul id="32841133-0f8f-8217-a75d-8122f2fc69e5" class="toggle"><li><details open=""><summary>설치 및 준비</summary><div style="display:contents" dir="auto"><ul id="a0641133-0f8f-8271-b3b4-8190f40bff02" class="bulleted-list"><li style="list-style-type:disc">Chrome Browser 설치<div style="display:contents" dir="ltr"><figure id="d7a41133-0f8f-82a2-97aa-01987626a4a1"><a href="https://www.google.com/intl/ko_kr/chrome/" class="bookmark source"><div class="bookmark-info"><div class="bookmark-text"><div class="bookmark-title">Chrome 웹브라우저</div><div class="bookmark-description">더욱 스마트해진 Google로 더 간편하고 안전하고 빠르게.</div></div><div class="bookmark-href"><img src="https://www.google.com/chrome/static/images/favicons/android-icon-192x192.png" class="icon bookmark-icon"/>https://www.google.com/intl/ko_kr/chrome/</div></div><img src="https://www.google.com/chrome/static/images/homepage/homepage-v2.png" class="bookmark-image"/></a></figure></div></li></ul></div><div style="display:contents" dir="auto"><ul id="d7441133-0f8f-83f2-8605-8138fdc7fd87" class="bulleted-list"><li style="list-style-type:disc">Selenium Baisc 설치<div style="display:contents" dir="auto"><p id="e4c41133-0f8f-8200-9e13-0125b57c67bc" class=""><a href="https://github.com/florentbr/SeleniumBasic/releases/tag/v2.0.9.0">https://github.com/florentbr/SeleniumBasic/releases/tag/v2.0.9.0</a></p></div></li></ul></div><div style="display:contents" dir="auto"><ul id="f5241133-0f8f-822a-a06e-017d5b8381ed" class="bulleted-list"><li style="list-style-type:disc">Chrome Driver 설치 및 실행 테스트<div style="display:contents" dir="auto"><p id="87941133-0f8f-8259-81a7-81ef794aff9a" class="">파일탐색기에서 아래 경로 입력</p></div><div style="display:contents" dir="auto"><pre id="25841133-0f8f-83b5-b221-810057a4e341" class="code code-wrap"><code class="language-visual-basic" style="white-space:pre-wrap;word-break:break-all">%LOCALAPPDATA%\SeleniumBasic</code></pre></div><div style="display:contents" dir="auto"><p id="02541133-0f8f-8229-8b45-81c2fa84b660" class="">
</p></div><div style="display:contents" dir="auto"><p id="8c441133-0f8f-834a-b5f3-81d81dcdaac1" class="">위 경로가 없는 경우 아래 경로 입력</p></div><div style="display:contents" dir="auto"><pre id="d4441133-0f8f-82dd-a611-01ef22ef4cf9" class="code code-wrap"><code class="language-visual-basic" style="white-space:pre-wrap;word-break:break-all">C:\Program Files\SeleniumBasic</code></pre></div><div style="display:contents" dir="auto"><p id="d2841133-0f8f-8233-a8e6-0166c7f57fc0" class="">
</p></div><div style="display:contents" dir="auto"><p id="f0c41133-0f8f-838c-8f5c-81333a41f1e2" class="">chromedriver.exe 라는 크롬드라이버 파일이 존재하는데 </p></div><div style="display:contents" dir="auto"><p id="e5a41133-0f8f-8385-9958-01ca0931d553" class="">우측의 수정된 날짜를 보니 2016-02-08 입니다.</p></div><div style="display:contents" dir="auto"><p id="17741133-0f8f-8321-94e5-01de5b099a45" class="">이 크롬드라이버는 내 PC의 크롬버전과 맞아야 작동이 되는데</p></div><div style="display:contents" dir="auto"><p id="a8241133-0f8f-835f-9609-81472842ae1f" class="">2016년 버전의 크롬드라이버는 지금 내 PC의 크롬 버전과 맞을리가 없기 때문에</p></div><div style="display:contents" dir="auto"><p id="c2841133-0f8f-836a-ae5f-01f17bbf33d8" class="">현재 크롬 버전에 맞는 드라이버를 다운받아서 바꿔줘야 합니다.</p></div><div style="display:contents" dir="ltr"><figure id="98041133-0f8f-8252-8e2a-019b6fa8c605" class="image"><a href="image%2042.png"><img style="width:586.6458740234375px" src="image%2042.png"/></a></figure></div><div style="display:contents" dir="auto"><p id="f3141133-0f8f-8356-8545-81bb390900cc" class="">
</p></div><div style="display:contents" dir="auto"><p id="98e41133-0f8f-82b8-a84e-0110dea4a163" class="">그럼 현재 크롬 버전을 먼저 살펴볼게요</p></div><div style="display:contents" dir="auto"><p id="c8241133-0f8f-833a-8f2a-819ddd504c63" class="">내 크롬브라우저의 우측 상단 [...] -&gt; 도움말 -&gt; Chrome 정보 로 들어갑니다.</p></div><div style="display:contents" dir="ltr"><figure id="89941133-0f8f-83ce-972b-018de9c41eca" class="image"><a href="https://cdn.imweb.me/upload/S2022090521e738598bf5e/0a4116f54a42a.png"><img src="https://cdn.imweb.me/upload/S2022090521e738598bf5e/0a4116f54a42a.png"/></a></figure></div><div style="display:contents" dir="auto"><p id="7db41133-0f8f-8281-a2f6-01a6f6009e37" class="">버전이 길게 나와있는데 맨 앞의 숫자 108 만 기억해줍니다.</p></div><div style="display:contents" dir="ltr"><figure id="9f541133-0f8f-8269-808d-01af47701720" class="image"><a href="https://cdn.imweb.me/upload/S2022090521e738598bf5e/7183f091bc799.png"><img src="https://cdn.imweb.me/upload/S2022090521e738598bf5e/7183f091bc799.png"/></a></figure></div><div style="display:contents" dir="auto"><p id="54d41133-0f8f-822d-943d-01c670fea01a" class="">

</p></div><div style="display:contents" dir="auto"><p id="b5241133-0f8f-825f-acb8-01e2688b4781" class="">위에서 확인한 Selenium Basic 설치 폴더로 이동한 뒤</p></div><div style="display:contents" dir="auto"><p id="b9141133-0f8f-82dd-af94-815229f69c75" class="">Ctrl+V 를 눌러 파일을 붙여넣습니다.</p></div><div style="display:contents" dir="auto"><p id="0b341133-0f8f-82ad-8149-0168f5ce0015" class="">그럼 이렇게 이미 있다고 알려주지만</p></div><div style="display:contents" dir="auto"><p id="4c941133-0f8f-838b-bb06-01611de17415" class="">옛날 크롬드라이브는 보내줄 시간이므로</p></div><div style="display:contents" dir="auto"><p id="41541133-0f8f-8352-a024-8190bec89e00" class="">[대상 폴더의 파일 덮어쓰기] 를 눌러줍니다.</p></div><div style="display:contents" dir="ltr"><figure id="2f741133-0f8f-83e1-977b-8125048f27a7" class="image"><a href="https://cdn.imweb.me/upload/S2022090521e738598bf5e/22b2412069f13.png"><img src="https://cdn.imweb.me/upload/S2022090521e738598bf5e/22b2412069f13.png"/></a></figure></div><div style="display:contents" dir="auto"><p id="1ad41133-0f8f-8264-804f-81790394a613" class="">
</p></div><div style="display:contents" dir="auto"><p id="28041133-0f8f-83c4-b5cc-0100ca9a6d37" class="">잠시후 새 크롬드라이버로 교체되고 수정한 날짜를 보면</p></div><div style="display:contents" dir="auto"><p id="53741133-0f8f-82df-bcc8-01d76119987a" class="">2016년이었던 파일이 최근 날짜로 변경된 것을 알 수 있습니다.</p></div><div style="display:contents" dir="ltr"><figure id="5ff41133-0f8f-83b3-8378-0150c80e4fab" class="image"><a href="https://cdn.imweb.me/upload/S2022090521e738598bf5e/0fcdbb2558d4c.png"><img src="https://cdn.imweb.me/upload/S2022090521e738598bf5e/0fcdbb2558d4c.png"/></a></figure></div><div style="display:contents" dir="auto"><p id="ba941133-0f8f-8270-845a-01f2867d6b05" class="">
</p></div><div style="display:contents" dir="auto"><p id="bbf41133-0f8f-8353-83c7-01d92f1a4a08" class="">이제 진짜로 셀레니움을 이용해서 크롬을 실행해보겠습니다.</p></div><div style="display:contents" dir="auto"><p id="4fc41133-0f8f-82d0-a279-01f97d283ce3" class="">열려있는 엑셀을 모두 닫고 엑셀을 새로 실행합니다.</p></div><div style="display:contents" dir="auto"><p id="02d41133-0f8f-831b-a296-8143339e020b" class="">Alt+F11 을 눌러 VBA 편집기를 연 후</p></div><div style="display:contents" dir="auto"><p id="ebf41133-0f8f-8215-8037-015496c9829b" class="">도구 -&gt; 참조 를 실행합니다.</p></div><div style="display:contents" dir="ltr"><figure id="68241133-0f8f-8313-b8a7-01bd9986fd26" class="image"><a href="https://cdn.imweb.me/upload/S2022090521e738598bf5e/4033a8fb39cc2.png"><img src="https://cdn.imweb.me/upload/S2022090521e738598bf5e/4033a8fb39cc2.png"/></a></figure></div><div style="display:contents" dir="auto"><p id="2a241133-0f8f-8298-b768-011f54fe2163" class="">아래로 한참 내리다보면 Selenium Type Library 가 나옵니다.</p></div><div style="display:contents" dir="auto"><p id="f7c41133-0f8f-83ec-81c2-81d63323c155" class="">(a,b,c 순이므로 Q,R,S,T,U 까지 내려가다보면 나와요)</p></div><div style="display:contents" dir="auto"><p id="d0141133-0f8f-83b9-b754-81e744238c3f" class="">이것을 체크해주고 확인을 누릅니다</p></div><div style="display:contents" dir="ltr"><figure id="a5b41133-0f8f-8279-a6da-8196f234637d" class="image"><a href="https://cdn.imweb.me/upload/S2022090521e738598bf5e/5413d4093e3e1.png"><img src="https://cdn.imweb.me/upload/S2022090521e738598bf5e/5413d4093e3e1.png"/></a></figure></div><div style="display:contents" dir="auto"><p id="de941133-0f8f-82f9-bdf4-81f3225af28a" class="">이제 코드를 작성해볼까요?</p></div><div style="display:contents" dir="auto"><p id="73b41133-0f8f-821c-a8f0-01f222d972af" class="">모듈을 열고 아래와 같이 코드를 작성 후 실행합니다.</p></div><div style="display:contents" dir="auto"><pre id="8f741133-0f8f-8395-88f2-01293658ee3b" class="code code-wrap"><code class="language-visual-basic" style="white-space:pre-wrap;word-break:break-all">Sub TEST()
    Dim driver As New ChromeDriver
    driver.Get &quot;https://www.yunjadong.com&quot;
End Sub</code></pre></div><div style="display:contents" dir="auto"><p id="7a541133-0f8f-83c8-811b-81b112e70826" class="">크롬브라우저가 열리면서 윤자동닷컴이 열리면 성공입니다.</p></div><div style="display:contents" dir="auto"><p id="28041133-0f8f-834c-afb8-0176080bb30e" class="">
</p></div><div style="display:contents" dir="auto"><p id="e1841133-0f8f-83ff-890b-81bd063a9f09" class="">출처</p></div><div style="display:contents" dir="ltr"><figure id="46c41133-0f8f-82e0-aee4-816c9ebc5e66"><a href="https://www.yunjadong.com/blogs/?bmode=view&amp;idx=13693858&amp;back_url=&amp;t=board&amp;page=1" class="bookmark source"><div class="bookmark-info"><div class="bookmark-text"><div class="bookmark-title">셀레니움 사용을 위해 필요한 크롬드라이버 다운로드 : 윤자동</div><div class="bookmark-description">엑셀 VBA에서 셀레니움 사용을 위해Selenium Basic을 설치하셨다고 해서바로 셀레니움을 사용할 순 없습니다.왜냐구요??크롬드라이버의 버전이 맞지 않기 때문인데요.먼저 셀레니움베이직이 설치된 폴더를 열어볼까요??셀레니움 베이직을 설치하면 아래 두 개의 경로중 한 곳에 설치됩니다.C:\Users\[사용자명]\AppData\Local\SeleniumBasicC:\Program Files\SeleniumBasic저는 위 경로에 설치되어 있었습니다.폴더를 들어가면 chromedriver.exe 라는 크롬드라이버 파일이 존재하는데우측의 수정된 날짜를 보니 2016-02-08 입니다.이 크롬드라이버는 내 PC의 크롬버전과 맞아야 작동이 되는데2016년 버전의 크롬드라이버는 지금 내 PC의 크롬 버전과 맞을리가 없기 때문에현재 크롬 버전에 맞는 드라이버를 다운받아서 바꿔줘야 합니다.그럼 현재 크롬 버전을 먼저 살펴볼게요내 크롬브라우저의 우측 상단 [...] -&gt; 도움말 -&gt; Chrome 정보 로 들어갑니다.버전이 길게 나와있는데 맨 앞의 숫자 108 만 기억해줍니다.크롬드라이버를 다운받기 위해 아래 링크를 클릭합니다.https://googlechromelabs.github.io/chrome-for-testing/#stable맨 왼쪽의 Binary는 chromedriver를 찾습니다.두 번째는 내 OS를 선택하면 되는데 윈도우라면 요즘 대부분 64bit 이므로 win64 를선택하면 되고맥,리눅스를 쓰신다면 잘 맞게 선택하시면 됩니다.URL을 드래그해서 복사한 뒤에 브라우저의 주소표시줄에 붙여넣고 엔터를 입력하면 파일다운로드가 시작됩니다.다운받은 파일은 zip 압축파일이므로 아무데나 일단 압축을 풀어줍니다.그럼 이렇게 chromedriver.exe 파일이 생성됩니다.이 파일을 Selenium Basic이 설치된 폴더로 옮겨주기 위해파일을 클릭하고 Ctrl+C 를 눌러 복사합니다.잘 안될 때도 있으니 Ctrl을 누른상태로 C를 5번정도 눌러줍시다많이 누른다고 돈 안들어요위에서 확인한 Selenium Basic 설치 폴더로 이동한 뒤Ctrl+V 를 눌러 파일을 붙여넣습니다.그럼 이렇게 이미 있다고 알려주지만옛날 크롬드라이브는 보내줄 시간이므로[대상 폴더의 파일 덮어쓰기] 를 눌러줍니다.잠시후 새 크롬드라이버로 교체되고 수정한 날짜를 보면2016년이었던 파일이 최근 날짜로 변경된 것을 알 수 있습니다.이제 진짜로 셀레니움을 이용해서 크롬을 실행해보겠습니다.열려있는 엑셀을 모두 닫고 엑셀을 새로 실행합니다.Alt+F11 을 눌러 VBA 편집기를 연 후도구 -&gt; 참조 를 실행합니다.아래로 한참 내리다보면 Selenium Type Library 가 나옵니다.(a,b,c 순이므로 Q,R,S,T,U 까지 내려가다보면 나와요)이것을 체크해주고 확인을 누릅니다이제 코드를 작성해볼까요?모듈을 열고 아래와 같이 코드를 작성합니다.아래 코드를 복사해서 붙여넣어도 됩니다.12345678Sub TEST()     Dim sel As New ChromeDriver        sel.Get &quot;https://www.yunjadong.com&quot;    End Sub Colored by Color Scriptercs이제 Sub ~ End Sub 사이에 커서를 위치해두고F5를 눌러 코드를 실행해봅니다.크롬브라우저가 열리면서 윤자동닷컴이 열리면 성공입니다.축하드려요. 셀레니움을 활용한 웹자동화에 입문하셨네요.앞으로 엑셀VBA를 통해 많은 웹자동화를 배워보아요.자동화를 잘하면내 업무시간이 극적으로 단축되고내 가치가 올라갑니다.--------------------------------------------------------------------------------만약 안되는 분들은 아래 링크에서 다운로드를 눌러닷넷프레임워크 3.5를 설치하신 후 &quot;재부팅&quot; 하시면 잘 될겁니다.https://www.microsoft.com/ko-kr/download/details.aspx?id=21</div></div><div class="bookmark-href"><img src="https://cdn.imweb.me/thumbnail/20230410/419bc224988f7.png" class="icon bookmark-icon"/>https://www.yunjadong.com/blogs/?bmode=view&amp;idx=13693858&amp;back_url=&amp;t=board&amp;page=1</div></div><img src="https://cdn.imweb.me/thumbnail/20250421/1938b94e91e5f.png" class="bookmark-image"/></a></figure></div></li></ul></div></details></li></ul></div><div style="display:contents" dir="auto"><ul id="3b941133-0f8f-8215-a56c-01296923d633" class="toggle"><li><details open=""><summary>로그인 자동화</summary><div style="display:contents" dir="auto"><p id="05841133-0f8f-8362-9dbe-81fdcb86fa2a" class="">아래 사이트를 접속하여 구조를 확인합니다.</p></div><div style="display:contents" dir="ltr"><figure id="c5541133-0f8f-832f-8fb4-010f1ab06003"><a href="https://the-internet.herokuapp.com/login" class="bookmark source"><div class="bookmark-info"><div class="bookmark-text"><div class="bookmark-title">The Internet</div></div><div class="bookmark-href">https://the-internet.herokuapp.com/login</div></div></a></figure></div><div style="display:contents" dir="auto"><p id="59941133-0f8f-839f-85a3-81c3589d9434" class="">
</p></div><div style="display:contents" dir="auto"><p id="2af41133-0f8f-8328-bfe1-8113aa14eea9" class="">아래 코드를 복사하여 VBA 에서 실행합니다.</p></div><div style="display:contents" dir="ltr"><figure class="block-color-default_background callout" style="white-space:pre-wrap;display:flex" id="b7f41133-0f8f-82ba-b508-81b43711a457"><div style="width:100%"><div style="display:contents" dir="auto"><p id="ae441133-0f8f-83f0-881e-8132691910e6" class="">VBA 상단의 <code>도구</code> → <code>참조</code>에서 <code>Selenium Type Library</code> 를 추가해야 합니다</p></div></div></figure></div><div style="display:contents" dir="auto"><pre id="75541133-0f8f-83ce-9299-812f361151a7" class="code code-wrap"><code class="language-visual-basic" style="white-space:pre-wrap;word-break:break-all">&#x27; VBA에서 Selenium을 사용하기 위해서는
&#x27; VBA 참조 설정에서 &quot;Selenium Type Library&quot;를 추가해야 합니다

Sub LoginWithSelenium()
    &#x27; Selenium WebDriver 객체 선언
    Dim driver As New WebDriver
    
    &#x27; 크롬 드라이버로 브라우저 실행
    driver.Start &quot;chrome&quot;
    driver.Window.Maximize
    
    &#x27; 웹 페이지 접속
    driver.Get &quot;https://the-internet.herokuapp.com/login&quot;
    
    &#x27; 페이지 로딩을 위한 대기 시간
    Application.wait Now + TimeSerial(0, 0, 1) &#x27; 1초 대기
    
    &#x27; 사용자 이름 입력
    On Error Resume Next
    driver.FindElementByCss(&quot;#username&quot;).SendKeys &quot;tomsmith&quot;
    Application.wait Now + TimeSerial(0, 0, 1) &#x27; 1초 대기
    
    &#x27; 비밀번호 입력
    driver.FindElementByCss(&quot;#password&quot;).SendKeys &quot;SuperSecretPassword!&quot;
    Application.wait Now + TimeSerial(0, 0, 1) &#x27; 1초 대기
    
    &#x27; 로그인 버튼 클릭
    driver.FindElementByCss(&quot;button[type=&#x27;submit&#x27;]&quot;).Click
    
    &#x27; 로그인 결과를 확인하기 위한 대기
    Application.wait Now + TimeSerial(0, 0, 5) &#x27; 5초 대기

End Sub</code></pre></div></details></li></ul></div><div style="display:contents" dir="auto"><ul id="38941133-0f8f-8278-80f3-011414449772" class="toggle"><li><details open=""><summary>네이버 증권 인기검색종목 가져오기</summary><div style="display:contents" dir="auto"><p id="7a541133-0f8f-825c-a224-01eb1cd0ffb6" class="">아래 페이지에서 인기검색종목 구조 확인하기</p></div><div style="display:contents" dir="auto"><p id="29341133-0f8f-8369-a9d4-01945437f476" class=""><a href="https://finance.naver.com/sise/">https://finance.naver.com/sise/</a></p></div><div style="display:contents" dir="auto"><p id="b3a41133-0f8f-8275-8841-8163a27f274f" class="">

</p></div><div style="display:contents" dir="auto"><p id="e7f41133-0f8f-82c5-a258-81b83ab04003" class=""><strong>기본 선택자 유형</strong></p></div><div style="display:contents" dir="auto"><ul id="f6c41133-0f8f-83f5-92b9-01953ee258f2" class="bulleted-list"><li style="list-style-type:disc"><strong>태그 선택자:</strong> HTML 태그 이름으로 요소를 선택<br/><code>p</code> - 모든 &lt;p&gt; 태그 선택</li></ul></div><div style="display:contents" dir="auto"><ul id="c4041133-0f8f-836d-8319-818499e53ca1" class="bulleted-list"><li style="list-style-type:disc"><strong>ID 선택자:</strong> ID 속성으로 요소를 선택<br/><code>#login-button</code> - id=&quot;login-button&quot; 인 요소 선택</li></ul></div><div style="display:contents" dir="auto"><ul id="75b41133-0f8f-835b-bdf0-016a12be0431" class="bulleted-list"><li style="list-style-type:disc"><strong>클래스 선택자:</strong> class 속성으로 요소를 선택<br/><code>.header</code> - class=&quot;header&quot; 인 모든 요소 선택</li></ul></div><div style="display:contents" dir="auto"><p id="dce41133-0f8f-820b-9139-018df5db8900" class="">

</p></div></details></li></ul></div></div></figure></div><div style="display:contents" dir="ltr"><figure class="block-color-default_background callout" style="white-space:pre-wrap;display:flex" id="24a41133-0f8f-8302-a8d4-0171277f9b1e"><div style="width:100%"><div style="display:contents" dir="auto"><h3 id="16541133-0f8f-8393-bbd7-01b253f84867" class="">4️⃣ HTTP 방식을 활용한 크롤링 자동화</h3></div><div style="display:contents" dir="auto"><hr id="b8f41133-0f8f-833e-b9bf-8193f680c8f0"/></div><div style="display:contents" dir="auto"><ul id="70a41133-0f8f-823e-953e-01ac5c75448a" class="toggle"><li><details open=""><summary>네이버 뉴스(검색 결과) WinHTTP로 가져오기</summary><div style="display:contents" dir="auto"><p id="2c141133-0f8f-8267-857c-01cb567535d0" class="">사이트 주소</p></div><div style="display:contents" dir="auto"><p id="c1341133-0f8f-832f-9dcf-811ff7c556ba" class=""><a href="https://search.naver.com/search.naver?ssc=tab.news.all&amp;where=news&amp;sm=tab_jum&amp;query=OK%EA%B8%88%EC%9C%B5">https://search.naver.com/search.naver?ssc=tab.news.all&amp;where=news&amp;sm=tab_jum&amp;query=OK금융</a></p></div><div style="display:contents" dir="auto"><p id="ae641133-0f8f-832f-89f6-81655066e6cb" class="">
</p></div><div style="display:contents" dir="auto"><h3 id="c3c41133-0f8f-8380-ba94-01adb3509307" class="">네이버 뉴스 페이지 구조 맛보기</h3></div><div style="display:contents" dir="auto"><p id="45041133-0f8f-8267-990a-01fc6659df83" class="">1) 개발자도구로 구조 보기</p></div><div style="display:contents" dir="auto"><ul id="dd241133-0f8f-8265-8e83-0144a09d95f1" class="bulleted-list"><li style="list-style-type:disc">크롬에서 뉴스 검색 결과 페이지 열기</li></ul></div><div style="display:contents" dir="auto"><ul id="f7941133-0f8f-83d0-bb6d-013846cb916e" class="bulleted-list"><li style="list-style-type:disc"><code>F12</code> → <strong>요소(Elements)</strong></li></ul></div><div style="display:contents" dir="auto"><ul id="96441133-0f8f-82ba-ab6a-011636ba1633" class="bulleted-list"><li style="list-style-type:disc">뉴스 제목을 클릭해 보면서, 제목/링크가 들어있는 태그의 <strong>class / data 속성 / a 태그 href</strong> 를 확인</li></ul></div><div style="display:contents" dir="auto"><ul id="9b541133-0f8f-83d9-8d0f-81510f462cd4" class="bulleted-list"><li style="list-style-type:disc">원하는 뉴스 1개 블록을 우클릭 → Copy → Copy element 로 HTML 덩어리를 복사해 둡니다.<div style="display:contents" dir="auto"><ul id="2c941133-0f8f-839b-925f-816cd50cb63c" class="bulleted-list"><li style="list-style-type:circle">오늘은 “한 화면에서만” 동작하면 성공입니다.</li></ul></div></li></ul></div><div style="display:contents" dir="ltr"><figure class="block-color-yellow_background callout" style="white-space:pre-wrap;display:flex" id="e9841133-0f8f-8366-a1d7-0128e7d36a26"><div style="font-size:1.5em"><span class="icon">⚠️</span></div><div style="width:100%"><div style="display:contents" dir="auto"><p id="33841133-0f8f-824b-b377-013086a8119d" class="">네이버 뉴스는 화면/유형에 따라 HTML 구조가 달라집니다.</p></div><div style="display:contents" dir="auto"><p id="9f041133-0f8f-8391-bd06-8100d3a241fe" class="">오늘은 아래 URL의 “뉴스 탭 검색 결과 화면”만 기준으로 먼저 성공시키는 것이 목표입니다.</p></div></div></figure></div><div style="display:contents" dir="auto"><h3 id="c4241133-0f8f-8364-b90a-815b2be1832d" class="">오늘 목표 데이터</h3></div><div style="display:con </p></div></details></li></ul></div><div style="display:contents" dir="auto"><ul id="9ea41133-0f8f-83b4-8311-81223ba4f6df" class="toggle"><li><details open=""><summary>Excel에 Gemini 심기</summary><div style="display:contents" dir="auto"><p id="39941133-0f8f-83ba-9062-8131024e53c4" class=""><strong>1) Gemini API란?</strong></p></div><div style="display:contents" dir="auto"><p id="aa941133-0f8f-823c-a51a-81fc8093d163" class="">Google이 만든 AI 모델(Gemini)을 외부 프로그램에서 호출할 수 있게 해주는 인터페이스입니다. 정해진 주소에 요청을 보내면 AI가 응답을 돌려줍니다.</p></div><div style="display:contents" dir="auto"><p id="c4a41133-0f8f-8310-b2c5-01a095c90505" class="">
</p></div><div style="display:contents" dir="auto"><p id="21b41133-0f8f-8258-a47b-8144806e9793" class=""><strong>2) 사전 준비: API Key 발급</strong></p></div><div style="display:contents" dir="auto"><p id="dcc41133-0f8f-8234-abd2-812832b83b32" class=""><strong>A. Google AI Studio에서 API Key 발급</strong></p></div><div style="display:contents" dir="auto"><ul id="5f841133-0f8f-8229-be84-8196f06b74a8" class="bulleted-list"><li style="list-style-type:disc"><a href="http://aistudio.google.com">aistudio.google.com</a> 접속 → Google 계정으로 로그인</li></ul></div><div style="display:contents" dir="auto"><ul id="4fc41133-0f8f-823a-bbac-01292e039218" class="bulleted-list"><li style="list-style-type:disc">좌측 메뉴 <strong>&quot;Get API Key&quot;</strong> → <strong>&quot;API Key 만들기&quot;</strong> 클릭</li></ul></div><div style="display:contents" dir="auto"><ul id="ef541133-0f8f-8239-b086-818fd6a46603" class="bulleted-list"><li style="list-style-type:disc">생성된 키를 복사하여 엑셀 <code>설정</code> 시트의 <code>B2</code> 셀에 붙여넣기</li></ul></div><div style="display:contents" dir="auto"><p id="a8e41133-0f8f-8202-959c-0177903ddf14" class="">
</p></div><div style="display:contents" dir="auto"><p id="9a841133-0f8f-8259-9e9b-012d143384e7" class=""><strong>B . 무료 사용량</strong></p></div><div style="display:contents" dir="ltr"><figure id="f8441133-0f8f-83d5-bba3-817125e88cbf" class="image"><a href="image%2043.png"><img style="width:2374px" src="image%2043.png"/></a></figure></div><div style="display:contents" dir="auto"><p id="0bb41133-0f8f-8388-8dbe-018e15db0a86" class="">
</p></div><div style="display:contents" dir="auto"><p id="d4a41133-0f8f-8257-af41-81683a3c73ab" class=""><strong>🔷 3) 실습 파일 구조</strong></p></div><div style="display:contents" dir="auto"><p id="b5841133-0f8f-823e-b8d0-01f46b3a7424" class="">아래 파일을 다운로드하세요</p></div><div style="display:contents" dir="ltr"><figure id="06141133-0f8f-82ad-88f5-0180ce3982c9"><div class="block-color-yellow_background source"><a href="Gemini_%EC%8B%A4%EC%8A%B5%ED%8C%8C%EC%9D%BC.xlsx">Gemini_실습파일.xlsx</a></div></figure></div><div style="display:contents" dir="auto"><p id="b3b41133-0f8f-827f-a696-012b4ad40be1" class="">
</p></div><div style="display:contents" dir="auto"><p id="70041133-0f8f-839d-9318-014138c554a4" class="">실습용 엑셀 파일은 2개 시트로 구성되어 있습니다.</p></div><div style="display:contents" dir="auto"><p id="74341133-0f8f-8381-b79d-81c4ff7a296f" class=""><strong>시트1) 설정</strong></p></div><div style="display:contents" dir="auto"><ul id="e8141133-0f8f-8326-bd04-81b4555cf442" class="bulleted-list"><li style="list-style-type:disc">A2: <strong>Gemini API Key</strong> / B2: API Key 입력 셀 (빨간색 안내문)</li></ul></div><div style="display:contents" dir="auto"><p id="9cb41133-0f8f-8293-abee-810570b469ad" class=""><strong>시트2) 감정분석</strong></p></div><div style="display:contents" dir="auto"><ul id="a6b41133-0f8f-83a3-8c40-814489baa8cc" class="bulleted-list"><li style="list-style-type:disc">A열: 번호 / B열: 문의내용 / <strong>C열: 감정 (자동 채워질 영역)</strong></li></ul></div><div style="display:contents" dir="auto"><ul id="a4b41133-0f8f-820c-ac72-01812acbd8e6" class="bulleted-list"><li style="list-style-type:disc">예시 데이터 10건: 긍정/부정/중립이 골고루 섞인 고객 문의</li></ul></div><div style="display:contents" dir="auto"><p id="aab41133-0f8f-8247-b2b0-015c3a7c9826" class="">
</p></div><div style="display:contents" dir="auto"><p id="98241133-0f8f-82d6-a1aa-81414ead4483" class=""><strong>🔷 4) 실습 목표</strong></p></div><div style="display:contents" dir="auto"><p id="9d041133-0f8f-83c3-89b4-816348939b2b" class="">버튼 하나 클릭 → Gemini가 각 셀 데이터를 읽고 → 결과를 지정 셀에 자동으로 채워넣기</p></div><div style="display:contents" dir="auto"><p id="44441133-0f8f-8313-9a3e-01315933d6d9" class=""><strong>실습) 고객 문의 감정 분석</strong></p></div><div style="display:contents" dir="auto"><ul id="e0041133-0f8f-8372-9b60-0160b82b0b4c" class="bulleted-list"><li style="list-style-type:disc">B열(문의내용)을 읽어서 Gemini에게 &quot;이 문의의 감정을 긍정/부정/중립 중 하나로 판별&quot;을 요청</li></ul></div><div style="display:contents" dir="auto"><ul id="ab141133-0f8f-829f-ace3-01deacb6d5e8" class="bulleted-list"><li style="list-style-type:disc">AI 응답을 C열(감정)에 자동 기록 — 감정이 비어있는 행만 처리</li></ul></div><div style="display:contents" dir="auto"><p id="e4941133-0f8f-823a-8446-818df2358add" class="">
</p></div><div style="display:contents" dir="auto"><p id="96c41133-0f8f-82a2-83c9-8103ecc3b2a2" class=""><strong>🔷 5) AI로 코드 생성하기 — 프롬프트</strong></p></div><div style="display:contents" dir="auto"><p id="c0441133-0f8f-8284-b5de-8100cdf56bff" class="">아래 프롬프트를 AI(예: ChatGPT, Gemini 등)에 입력하면 VBA 코드를 생성해줍니다.</p></div><div style="display:contents" dir="auto"><p id="31541133-0f8f-82ae-b3ad-8123a0231bc9" class=""><strong>프롬프트</strong></p></div><div style="display:contents" dir="auto"><pre id="ac441133-0f8f-8293-b38f-01c3fca791ab" class="code code-wrap"><code class="language-jsx" style="white-space:pre-wrap;word-break:break-all">Excel VBA로 Gemini API를 호출하는 매크로를 만들어줘.

[요구사항]
1. WinHttp.WinHttpRequest.5.1 객체를 사용해서 POST 방식으로 호출
2. Gemini API 엔드포인트: https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=API_KEY
3. API Key는 &quot;설정&quot; 시트의 B2 셀에서 읽어옴
4. &quot;감정분석&quot; 시트에서 B열(문의내용)을 읽어서 Gemini에게 &quot;이 문의의 감정을 긍정/부정/중립 중 하나만 답해줘&quot;라고 요청
5. Gemini 응답을 C열(감정)에 자동으로 채워넣기
6. C열(감정)이 비어있고 B열(문의내용)이 있는 행만 반복 처리 (2행부터)
7. JSON 요청 본문: {&quot;contents&quot;:[{&quot;parts&quot;:[{&quot;text&quot;:&quot;프롬프트&quot;}]}]}
8. 응답에서 candidates[0].content.parts[0].text 문자열 파싱으로 추출
9. TLS 1.2 설정 (http.Option(9) = 2720)
10. 처리 완료 후 MsgBox 알림
11. API 호출 간격 4초 대기 포함</code></pre></div><div style="display:contents" dir="auto"><p id="a7341133-0f8f-82a8-a3db-01179fd799a0" class=""><strong>⚠️ 주의사항</strong></p></div><div style="display:contents" dir="auto"><ul id="55d41133-0f8f-839e-9db8-01de071e5272" class="bulleted-list"><li style="list-style-type:disc"><strong>TLS 설정: </strong>Google API는 TLS 1.2 이상을 요구합니다. <code>http.Option(9) = 2720</code> 설정이 없으면 연결이 실패할 수 있습니다.</li></ul></div><div style="display:contents" dir="auto"><ul id="34241133-0f8f-824e-b66a-81b950b34e15" class="bulleted-list"><li style="list-style-type:disc"><strong>요청 제한: </strong>무료 티어는 분당 15회 제한이 있으므로, 반복문에서 대량 호출 시 <code>Application.Wait</code>로 4초 간격을 두는 것이 좋습니다.</li></ul></div><div style="display:contents" dir="auto"><ul id="d6041133-0f8f-8354-be86-81513fb82562" class="bulleted-list"><li style="list-style-type:disc"><strong>API Key 보안: </strong>코드에 API Key를 하드코딩하지 말고, 별도 시트(설정)에서 읽어오는 방식을 사용합니다.</li></ul></div></details></li></ul></div></div></figure></div></div></article><span class="sans" style="font-size:14px;padding-top:2em"></span></body></html>
